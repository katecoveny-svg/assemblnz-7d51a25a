# PIKAU scenario: Privacy Copilot — happy path
# Scenario ID: pikau-privacy-audit-cafe-25pax-happy
# Kete: PIKAU
# Version: stub · 0.1 · 2026-04-09

id: pikau-privacy-audit-cafe-25pax-happy
kete: PIKAU
title: "Privacy position review — 25-person Auckland café, no material gaps"
buyer_persona: >
  A café owner or operations manager in Auckland with 20–30 staff.
  Has heard about IPP3A from their lawyer or a trade article.
  Wants to understand whether they have a privacy compliance problem
  before talking to a consultant. No formal privacy programme in place yet.
seed: 42

generator_inputs:
  employee_count: 25
  industry: hospitality
  data_scenario: baseline_no_breach
  ipp3a_exposure: low          # no significant indirect collection identified
  has_vendor_register: false   # common gap for small businesses

workflow_id: pikau-privacy-copilot-v0.1

expected_bundle:
  simulated: true
  finding_count_min: 3
  finding_count_max: 12
  pipeline_stages_expected:
    - kahu
    - iho
    - ta
    - mahara
    - mana
  kete_extension_fields_required:
    - ipp_snapshot
    - breach_risk_score
    - ipp3a_collection_source_notices

success_criteria:
  - description: "Bundle is valid — all findings have source pointers"
    assertion: no_unsourced_findings
    params: {}

  - description: "Bundle is correctly marked as simulated"
    assertion: bundle_valid
    params:
      simulated: true

  - description: "IPP3A snapshot entry exists"
    assertion: ipp_snapshot_status
    params:
      principle: IPP3A
      # happy path: low exposure → expect 'compliant' or 'not_applicable'
      expected_statuses: [compliant, not_applicable]

  - description: "At least one IPP finding produced"
    assertion: finding_exists
    params:
      source_type: law
      label_contains: "Privacy Act 2020"

public_visibility: true
last_verified: null   # [TODO: set when scenario is first run green]
