# PIKAU scenario: Privacy Copilot — IPP3A triggered path
# Scenario ID: pikau-ipp3a-triggered-cafe-25pax
# Kete: PIKAU
# Version: stub · 0.1 · 2026-04-09

id: pikau-ipp3a-triggered-cafe-25pax
kete: PIKAU
title: "Privacy position review — 25-person Auckland café, IPP3A exposure found"
buyer_persona: >
  Same café owner as the happy-path scenario, but this time the workflow
  discovers that the café uses a third-party rostering app that shares
  employee data with an overseas payroll provider — without the employees
  being notified. This triggers an IPP3A finding.
  Demonstrates to a buyer what the pack looks like when a real issue is found.
seed: 137

generator_inputs:
  employee_count: 25
  industry: hospitality
  data_scenario: ipp3a_indirect_collection
  ipp3a_exposure: high         # indirect collection via rostering → overseas payroll
  has_vendor_register: false
  overseas_data_processor: true
  employees_notified: false    # the trigger condition

workflow_id: pikau-privacy-copilot-v0.1

expected_bundle:
  simulated: true
  finding_count_min: 2
  finding_count_max: 15
  pipeline_stages_expected:
    - kahu
    - iho
    - ta
    - mahara
    - mana
  kete_extension_fields_required:
    - ipp_snapshot
    - breach_risk_score
    - ipp3a_collection_source_notices

success_criteria:
  - description: "Bundle is valid — all findings have source pointers"
    assertion: no_unsourced_findings
    params: {}

  - description: "Bundle is correctly marked as simulated"
    assertion: bundle_valid
    params:
      simulated: true

  - description: "IPP3A snapshot shows at_risk or non_compliant"
    assertion: ipp_snapshot_status
    params:
      principle: IPP3A
      expected_statuses: [at_risk, non_compliant]

  - description: "At least one IPP3A-specific finding with Privacy Act 2020 citation"
    assertion: finding_exists
    params:
      source_type: law
      label_contains: "Privacy Act 2020"

  - description: "IPP3A collection source notice recorded for the rostering data"
    assertion: finding_exists
    params:
      source_type: law
      label_contains: "IPP3A"

  - description: "At least one high or critical severity finding"
    assertion: finding_severity
    params:
      min_severity: high

public_visibility: true
last_verified: null   # [TODO: set when scenario is first run green]
