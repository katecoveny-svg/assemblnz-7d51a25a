<svg width="200" height="240" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 3D brain gradient — kowhai gold -->
    <radialGradient id="maharaBody" cx="42%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#FFFDE7" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#F0D078"/>
      <stop offset="70%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8892A"/>
    </radialGradient>
    <!-- Neural connection gradient -->
    <radialGradient id="maharaNeural" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0D078" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0.1"/>
    </radialGradient>
    <!-- Aura -->
    <radialGradient id="maharaAura" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#D4A843" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow filters -->
    <filter id="maharaSoftGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="maharaWideGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="maharaStarGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient aura glow -->
  <ellipse cx="100" cy="80" rx="80" ry="60" fill="url(#maharaAura)" filter="url(#maharaWideGlow)"/>

  <!-- Ma constellation stars -->
  <circle cx="20" cy="15" r="1.6" fill="#E8E4DD" filter="url(#maharaStarGlow)"/>
  <circle cx="180" cy="18" r="1.8" fill="#E8E4DD" filter="url(#maharaStarGlow)"/>
  <circle cx="40" cy="40" r="1.0" fill="#F5F0E8" filter="url(#maharaStarGlow)"/>
  <circle cx="162" cy="35" r="1.2" fill="#F5F0E8" filter="url(#maharaStarGlow)"/>
  <circle cx="10" cy="65" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="190" cy="60" r="0.7" fill="white" opacity="0.5"/>
  <circle cx="55" cy="10" r="0.6" fill="#E8E4DD" opacity="0.5"/>
  <circle cx="145" cy="8" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="28" cy="130" r="0.5" fill="#E8E4DD" opacity="0.35"/>
  <circle cx="172" cy="128" r="0.5" fill="white" opacity="0.3"/>
  <circle cx="65" cy="155" r="0.6" fill="#F5F0E8" opacity="0.3"/>
  <circle cx="138" cy="152" r="0.5" fill="#E8E4DD" opacity="0.3"/>

  <!-- Neural network connections (behind brain) -->
  <line x1="55" y1="90" x2="30" y2="120" stroke="#D4A843" stroke-width="1.2" opacity="0.2" filter="url(#maharaSoftGlow)"/>
  <line x1="145" y1="90" x2="170" y2="120" stroke="#D4A843" stroke-width="1.2" opacity="0.2" filter="url(#maharaSoftGlow)"/>
  <line x1="100" y1="110" x2="100" y2="148" stroke="#D4A843" stroke-width="1.2" opacity="0.2" filter="url(#maharaSoftGlow)"/>
  <line x1="70" y1="100" x2="42" y2="135" stroke="#F0D078" stroke-width="0.8" opacity="0.15"/>
  <line x1="130" y1="100" x2="158" y2="135" stroke="#F0D078" stroke-width="0.8" opacity="0.15"/>

  <!-- Neural endpoint nodes -->
  <circle cx="30" cy="120" r="4" fill="#D4A843" opacity="0.3" filter="url(#maharaSoftGlow)"/>
  <circle cx="170" cy="120" r="4" fill="#D4A843" opacity="0.3" filter="url(#maharaSoftGlow)"/>
  <circle cx="100" cy="148" r="4" fill="#D4A843" opacity="0.3" filter="url(#maharaSoftGlow)"/>
  <circle cx="42" cy="135" r="3" fill="#F0D078" opacity="0.2" filter="url(#maharaStarGlow)"/>
  <circle cx="158" cy="135" r="3" fill="#F0D078" opacity="0.2" filter="url(#maharaStarGlow)"/>

  <!-- Main brain sphere -->
  <circle cx="100" cy="72" r="42" fill="url(#maharaBody)" filter="url(#maharaSoftGlow)"/>

  <!-- 3D shine highlight -->
  <ellipse cx="88" cy="55" rx="18" ry="14" fill="white" opacity="0.08"/>

  <!-- Brain edge highlight -->
  <circle cx="100" cy="72" r="42" fill="none" stroke="#FFFDE7" stroke-width="0.8" opacity="0.25"/>

  <!-- Inner circuit pattern — brain folds -->
  <path d="M 75 60 Q 85 50 100 55 Q 115 60 120 50" fill="none" stroke="#FFFDE7" stroke-width="1.2" opacity="0.2"/>
  <path d="M 70 75 Q 85 70 100 75 Q 115 80 130 72" fill="none" stroke="#FFFDE7" stroke-width="1.2" opacity="0.18"/>
  <path d="M 72 88 Q 88 82 100 88 Q 112 94 128 86" fill="none" stroke="#FFFDE7" stroke-width="1" opacity="0.15"/>

  <!-- Inner memory rings -->
  <circle cx="100" cy="72" r="28" fill="none" stroke="#F0D078" stroke-width="0.8" opacity="0.15"/>
  <circle cx="100" cy="72" r="18" fill="none" stroke="#F0D078" stroke-width="0.6" opacity="0.12"/>

  <!-- Centre memory core -->
  <circle cx="100" cy="72" r="10" fill="#F0D078" opacity="0.3" filter="url(#maharaSoftGlow)"/>
  <circle cx="100" cy="72" r="5" fill="white" opacity="0.5"/>

  <!-- Gold trail particles -->
  <circle cx="35" cy="50" r="1.5" fill="#D4A843" opacity="0.2" filter="url(#maharaStarGlow)"/>
  <circle cx="168" cy="48" r="1.5" fill="#D4A843" opacity="0.2" filter="url(#maharaStarGlow)"/>
  <circle cx="50" cy="115" r="1.0" fill="#F0D078" opacity="0.15" filter="url(#maharaStarGlow)"/>
  <circle cx="152" cy="112" r="1.0" fill="#F0D078" opacity="0.15" filter="url(#maharaStarGlow)"/>

  <!-- Wordmark -->
  <text x="100" y="195" font-family="Lato, sans-serif" font-size="20" font-weight="300" letter-spacing="6" text-anchor="middle" fill="#D4A843">MAHARA</text>
  <text x="100" y="215" font-family="Plus Jakarta Sans, sans-serif" font-size="9" font-weight="300" letter-spacing="2" text-anchor="middle" fill="#E8E4DD" opacity="0.45">BUSINESS MEMORY</text>
</svg>
