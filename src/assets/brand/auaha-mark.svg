<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<defs>
<radialGradient id="bright-gold" cx="35%" cy="35%">
<stop offset="0%" style="stop-color:#FFF5DD;stop-opacity:1"/>
<stop offset="70%" style="stop-color:#F0D078;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#D4B855;stop-opacity:1"/>
</radialGradient>
<radialGradient id="light-teal" cx="35%" cy="35%">
<stop offset="0%" style="stop-color:#8BC4B8;stop-opacity:1"/>
<stop offset="70%" style="stop-color:#5AADA0;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#3F8B81;stop-opacity:1"/>
</radialGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
<feMerge>
<feMergeNode in="coloredBlur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
</defs>
<line x1="85" y1="30" x2="35" y2="165" stroke="white" stroke-width="1.5" opacity="0.25"/>
<line x1="85" y1="30" x2="155" y2="150" stroke="white" stroke-width="1.5" opacity="0.25"/>
<line x1="35" y1="165" x2="155" y2="150" stroke="white" stroke-width="1.5" opacity="0.25"/>
<circle cx="85" cy="30" r="18" fill="url(#bright-gold)" filter="url(#glow)"/>
<circle cx="85" cy="30" r="14" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
<circle cx="35" cy="165" r="18" fill="url(#light-teal)" filter="url(#glow)"/>
<circle cx="35" cy="165" r="14" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
<circle cx="155" cy="150" r="18" fill="url(#bright-gold)" filter="url(#glow)"/>
<circle cx="155" cy="150" r="14" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
</svg>