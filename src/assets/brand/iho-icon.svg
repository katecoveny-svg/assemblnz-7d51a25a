<svg width="200" height="240" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 3D orb gradient — gold-to-pounamu brain core -->
    <radialGradient id="ihoCore" cx="42%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#FFFDE7" stop-opacity="0.6"/>
      <stop offset="25%" stop-color="#F0D078"/>
      <stop offset="55%" stop-color="#D4A843"/>
      <stop offset="85%" stop-color="#3A7D6E"/>
      <stop offset="100%" stop-color="#2B5C54"/>
    </radialGradient>
    <!-- Orbit ring gradient -->
    <radialGradient id="ihoRing" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3A7D6E" stop-opacity="0.1"/>
    </radialGradient>
    <!-- Aura -->
    <radialGradient id="ihoAura" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.2"/>
      <stop offset="40%" stop-color="#3A7D6E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1A3A5C" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow filters -->
    <filter id="ihoSoftGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ihoWideGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ihoStarGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient aura glow — large, multi-layered -->
  <ellipse cx="100" cy="82" rx="90" ry="70" fill="url(#ihoAura)" filter="url(#ihoWideGlow)"/>

  <!-- Ma constellation stars -->
  <circle cx="15" cy="12" r="1.8" fill="#E8E4DD" filter="url(#ihoStarGlow)"/>
  <circle cx="185" cy="16" r="2.0" fill="#E8E4DD" filter="url(#ihoStarGlow)"/>
  <circle cx="35" cy="38" r="1.2" fill="#F5F0E8" filter="url(#ihoStarGlow)"/>
  <circle cx="168" cy="32" r="1.4" fill="#F5F0E8" filter="url(#ihoStarGlow)"/>
  <circle cx="8" cy="62" r="0.9" fill="white" opacity="0.7"/>
  <circle cx="192" cy="58" r="1.0" fill="white" opacity="0.6"/>
  <circle cx="50" cy="8" r="0.7" fill="#E8E4DD" opacity="0.5"/>
  <circle cx="148" cy="6" r="0.6" fill="white" opacity="0.4"/>
  <circle cx="22" cy="135" r="0.6" fill="#E8E4DD" opacity="0.4"/>
  <circle cx="178" cy="130" r="0.6" fill="white" opacity="0.35"/>
  <circle cx="60" cy="158" r="0.7" fill="#F5F0E8" opacity="0.3"/>
  <circle cx="142" cy="155" r="0.5" fill="#E8E4DD" opacity="0.3"/>
  <circle cx="30" cy="95" r="0.5" fill="white" opacity="0.3"/>
  <circle cx="172" cy="90" r="0.5" fill="white" opacity="0.3"/>

  <!-- Outer orbit ring 3 -->
  <ellipse cx="100" cy="82" rx="72" ry="72" fill="none" stroke="#3A7D6E" stroke-width="0.6" opacity="0.1"/>
  <!-- Outer orbit ring 2 -->
  <ellipse cx="100" cy="82" rx="58" ry="58" fill="none" stroke="#D4A843" stroke-width="0.8" opacity="0.12"/>
  <!-- Outer orbit ring 1 -->
  <ellipse cx="100" cy="82" rx="48" ry="48" fill="none" stroke="#F0D078" stroke-width="1" opacity="0.15"/>

  <!-- Orbiting satellite nodes -->
  <circle cx="148" cy="82" r="4" fill="#D4A843" opacity="0.4" filter="url(#ihoSoftGlow)"/>
  <circle cx="148" cy="82" r="2" fill="white" opacity="0.6"/>
  <circle cx="52" cy="82" r="4" fill="#3A7D6E" opacity="0.4" filter="url(#ihoSoftGlow)"/>
  <circle cx="52" cy="82" r="2" fill="white" opacity="0.5"/>
  <circle cx="100" cy="34" r="3.5" fill="#5AADA0" opacity="0.35" filter="url(#ihoSoftGlow)"/>
  <circle cx="100" cy="34" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="100" cy="130" r="3.5" fill="#1A3A5C" opacity="0.35" filter="url(#ihoSoftGlow)"/>
  <circle cx="100" cy="130" r="1.5" fill="white" opacity="0.4"/>

  <!-- Connection lines to satellites -->
  <line x1="100" y1="82" x2="148" y2="82" stroke="#D4A843" stroke-width="0.8" opacity="0.15"/>
  <line x1="100" y1="82" x2="52" y2="82" stroke="#3A7D6E" stroke-width="0.8" opacity="0.15"/>
  <line x1="100" y1="82" x2="100" y2="34" stroke="#5AADA0" stroke-width="0.8" opacity="0.15"/>
  <line x1="100" y1="82" x2="100" y2="130" stroke="#1A3A5C" stroke-width="0.8" opacity="0.12"/>

  <!-- Main core orb -->
  <circle cx="100" cy="82" r="32" fill="url(#ihoCore)" filter="url(#ihoSoftGlow)"/>

  <!-- 3D shine highlight -->
  <ellipse cx="90" cy="65" rx="14" ry="12" fill="white" opacity="0.1"/>

  <!-- Core edge highlight -->
  <circle cx="100" cy="82" r="32" fill="none" stroke="#FFFDE7" stroke-width="0.8" opacity="0.25"/>

  <!-- Inner rings -->
  <circle cx="100" cy="82" r="22" fill="none" stroke="#F0D078" stroke-width="1" opacity="0.2"/>
  <circle cx="100" cy="82" r="14" fill="none" stroke="#5AADA0" stroke-width="0.8" opacity="0.18"/>

  <!-- Centre pulse -->
  <circle cx="100" cy="82" r="8" fill="#F0D078" opacity="0.5" filter="url(#ihoSoftGlow)"/>
  <circle cx="100" cy="82" r="4" fill="white" opacity="0.7"/>

  <!-- Gold/teal trail particles -->
  <circle cx="28" cy="50" r="1.8" fill="#D4A843" opacity="0.2" filter="url(#ihoStarGlow)"/>
  <circle cx="172" cy="48" r="1.8" fill="#D4A843" opacity="0.2" filter="url(#ihoStarGlow)"/>
  <circle cx="40" cy="120" r="1.2" fill="#3A7D6E" opacity="0.15" filter="url(#ihoStarGlow)"/>
  <circle cx="160" cy="118" r="1.2" fill="#3A7D6E" opacity="0.15" filter="url(#ihoStarGlow)"/>
  <circle cx="70" cy="140" r="0.8" fill="#5AADA0" opacity="0.12" filter="url(#ihoStarGlow)"/>
  <circle cx="132" cy="138" r="0.8" fill="#5AADA0" opacity="0.12" filter="url(#ihoStarGlow)"/>

  <!-- Wordmark -->
  <text x="100" y="195" font-family="Lato, sans-serif" font-size="20" font-weight="300" letter-spacing="6" text-anchor="middle" fill="#D4A843">IHO</text>
  <text x="100" y="215" font-family="Plus Jakarta Sans, sans-serif" font-size="9" font-weight="300" letter-spacing="2" text-anchor="middle" fill="#E8E4DD" opacity="0.45">ASSEMBL BRAIN</text>
</svg>
