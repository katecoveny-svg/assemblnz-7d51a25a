<svg width="200" height="240" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 3D key gradient — pounamu authority -->
    <radialGradient id="manaBody" cx="42%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#A8D5CB" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#5AADA0"/>
      <stop offset="70%" stop-color="#3A7D6E"/>
      <stop offset="100%" stop-color="#2B5C54"/>
    </radialGradient>
    <!-- Lock ring gradient -->
    <radialGradient id="manaRing" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#5AADA0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3A7D6E" stop-opacity="0.2"/>
    </radialGradient>
    <!-- Aura -->
    <radialGradient id="manaAura" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#3A7D6E" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#3A7D6E" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#3A7D6E" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow filters -->
    <filter id="manaSoftGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="manaWideGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="manaStarGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient aura glow -->
  <ellipse cx="100" cy="85" rx="78" ry="62" fill="url(#manaAura)" filter="url(#manaWideGlow)"/>

  <!-- Ma constellation stars -->
  <circle cx="18" cy="12" r="1.5" fill="#E8E4DD" filter="url(#manaStarGlow)"/>
  <circle cx="182" cy="16" r="1.7" fill="#E8E4DD" filter="url(#manaStarGlow)"/>
  <circle cx="35" cy="38" r="1.0" fill="#F5F0E8" filter="url(#manaStarGlow)"/>
  <circle cx="168" cy="32" r="1.2" fill="#F5F0E8" filter="url(#manaStarGlow)"/>
  <circle cx="8" cy="62" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="192" cy="58" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="50" cy="8" r="0.6" fill="#E8E4DD" opacity="0.5"/>
  <circle cx="148" cy="6" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="22" cy="125" r="0.5" fill="#E8E4DD" opacity="0.35"/>
  <circle cx="178" cy="120" r="0.5" fill="white" opacity="0.3"/>
  <circle cx="60" cy="160" r="0.6" fill="#F5F0E8" opacity="0.3"/>
  <circle cx="142" cy="155" r="0.5" fill="#E8E4DD" opacity="0.25"/>

  <!-- Key bow / ring — large circle at top -->
  <circle cx="100" cy="60" r="32" fill="url(#manaRing)" filter="url(#manaSoftGlow)"/>
  <circle cx="100" cy="60" r="32" fill="none" stroke="#A8D5CB" stroke-width="1" opacity="0.35"/>
  <!-- Inner ring cutout -->
  <circle cx="100" cy="60" r="18" fill="#09090F" opacity="0.6"/>
  <circle cx="100" cy="60" r="18" fill="none" stroke="#5AADA0" stroke-width="0.8" opacity="0.3"/>
  <!-- Ring 3D highlight -->
  <ellipse cx="90" cy="48" rx="12" ry="8" fill="white" opacity="0.06"/>

  <!-- Key centre node -->
  <circle cx="100" cy="60" r="8" fill="#5AADA0" opacity="0.4" filter="url(#manaSoftGlow)"/>
  <circle cx="100" cy="60" r="4" fill="white" opacity="0.5"/>

  <!-- Key shaft -->
  <rect x="94" y="88" width="12" height="52" rx="3" fill="url(#manaBody)" filter="url(#manaSoftGlow)"/>
  <rect x="94" y="88" width="12" height="52" rx="3" fill="none" stroke="#A8D5CB" stroke-width="0.8" opacity="0.3"/>
  <!-- Shaft 3D highlight -->
  <rect x="95" y="90" width="5" height="24" rx="2" fill="white" opacity="0.06"/>

  <!-- Key teeth / wards -->
  <rect x="106" y="118" width="16" height="6" rx="2" fill="url(#manaBody)"/>
  <rect x="106" y="118" width="16" height="6" rx="2" fill="none" stroke="#A8D5CB" stroke-width="0.6" opacity="0.3"/>
  <rect x="106" y="130" width="12" height="6" rx="2" fill="url(#manaBody)"/>
  <rect x="106" y="130" width="12" height="6" rx="2" fill="none" stroke="#A8D5CB" stroke-width="0.6" opacity="0.3"/>

  <!-- Teal trail particles -->
  <circle cx="40" cy="48" r="1.5" fill="#5AADA0" opacity="0.2" filter="url(#manaStarGlow)"/>
  <circle cx="162" cy="45" r="1.5" fill="#5AADA0" opacity="0.2" filter="url(#manaStarGlow)"/>
  <circle cx="55" cy="130" r="1.0" fill="#3A7D6E" opacity="0.15" filter="url(#manaStarGlow)"/>
  <circle cx="148" cy="128" r="1.0" fill="#3A7D6E" opacity="0.15" filter="url(#manaStarGlow)"/>

  <!-- Wordmark -->
  <text x="100" y="195" font-family="Lato, sans-serif" font-size="20" font-weight="300" letter-spacing="6" text-anchor="middle" fill="#5AADA0">MANA</text>
  <text x="100" y="215" font-family="Plus Jakarta Sans, sans-serif" font-size="9" font-weight="300" letter-spacing="2" text-anchor="middle" fill="#E8E4DD" opacity="0.45">ACCESS CONTROL</text>
</svg>
