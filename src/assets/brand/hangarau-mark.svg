<line x1="160" y1="100" x2="100" y2="160" stroke="white" stroke-width="1.5" opacity="0.25"/>
<line x1="100" y1="160" x2="40" y2="100" stroke="white" stroke-width="1.5" opacity="0.25"/>
<line x1="40" y1="100" x2="160" y2="100" stroke="white" stroke-width="1.5" opacity="0.25"/>
<circle cx="100" cy="40" r="18" fill="url(#light-teal)" filter="url(#glow)"/>
<circle cx="100" cy="40" r="14" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
<circle cx="160" cy="100" r="18" fill="url(#dark-blue)" filter="url(#glow)"/>
<circle cx="160" cy="100" r="14" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
<circle cx="100" cy="160" r="18" fill="url(#light-teal)" filter="url(#glow)"/>
<circle cx="100" cy="160" r="14" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
<circle cx="40" cy="100" r="18" fill="url(#dark-blue)" filter="url(#glow)"/>
<circle cx="40" cy="100" r="14" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
</svg>