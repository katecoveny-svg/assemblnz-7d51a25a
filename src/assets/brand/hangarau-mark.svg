<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<defs>
<radialGradient id="light-teal" cx="35%" cy="35%">
<stop offset="0%" style="stop-color:#8BC4B8;stop-opacity:1"/>
<stop offset="70%" style="stop-color:#5AADA0;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#3F8B81;stop-opacity:1"/>
</radialGradient>
<radialGradient id="dark-blue" cx="35%" cy="35%">
<stop offset="0%" style="stop-color:#5A7AA0;stop-opacity:1"/>
<stop offset="70%" style="stop-color:#3A6A9C;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#234A75;stop-opacity:1"/>
</radialGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
<feMerge>
<feMergeNode in="coloredBlur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
</defs>
<line x1="100" y1="40" x2="160" y2="100" stroke="white" stroke-width="1.5" opacity="0.25"/>
<line x1="100" y1="40" x2="100" y2="160" stroke="white" stroke-width="1.5" opacity="0.25"/>
