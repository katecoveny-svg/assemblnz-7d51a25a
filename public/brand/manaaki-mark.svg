<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<defs>
<radialGradient id="kowhai-grad" cx="35%" cy="35%">
<stop offset="0%" style="stop-color:#F5E6C8;stop-opacity:1"/>
<stop offset="70%" style="stop-color:#D4A843;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#B8892A;stop-opacity:1"/>
</radialGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
