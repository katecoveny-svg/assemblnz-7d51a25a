<circle cx="100" cy="170" r="18" fill="url(#pounamu-grad)" filter="url(#glow)"/>
<circle cx="100" cy="170" r="14" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
<circle cx="40" cy="40" r="18" fill="url(#pounamu-grad)" filter="url(#glow)"/>
<circle cx="40" cy="40" r="14" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
<circle cx="160" cy="40" r="18" fill="url(#pounamu-grad)" filter="url(#glow)"/>
