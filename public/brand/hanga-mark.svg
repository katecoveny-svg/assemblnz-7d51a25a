<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<defs>
<radialGradient id="pounamu-grad" cx="35%" cy="35%">
<stop offset="0%" style="stop-color:#6FA89A;stop-opacity:1"/>
<stop offset="70%" style="stop-color:#3A7D6E;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#2B5C54;stop-opacity:1"/>
