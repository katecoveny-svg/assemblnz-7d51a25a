<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<defs>
<radialGradient id="tangaroa-grad" cx="35%" cy="35%">
<stop offset="0%" style="stop-color:#4A6A92;stop-opacity:1"/>
<stop offset="70%" style="stop-color:#1A3A5C;stop-opacity:1"/>
<stop offset="100%" style="stop-color:#0F2538;stop-opacity:1"/>
</radialGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
<feMerge>
<feMergeNode in="coloredBlur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
</defs>
<line x1="30" y1="100" x2="100" y2="50" stroke="white" stroke-width="1.5" opacity="0.25"/>
<line x1="30" y1="100" x2="100" y2="150" stroke="white" stroke-width="1.5" opacity="0.25"/>
<line x1="100" y1="50" x2="100" y2="150" stroke="white" stroke-width="1.5" opacity="0.25"/>
<circle cx="30" cy="100" r="18" fill="url(#tangaroa-grad)" filter="url(#glow)"/>
<circle cx="30" cy="100" r="14" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
<circle cx="100" cy="50" r="18" fill="url(#tangaroa-grad)" filter="url(#glow)"/>
<circle cx="100" cy="50" r="14" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
<circle cx="100" cy="150" r="18" fill="url(#tangaroa-grad)" filter="url(#glow)"/>
<circle cx="100" cy="150" r="14" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
</svg>